<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Knowledge Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a12;
    --panel:rgba(255,255,255,0.04);
    --panel-border:rgba(255,255,255,0.08);
    --text:#e8e8f0;
    --muted:#9494a8;
    --accent1:#8b5cf6;
    --accent2:#3b82f6;
    --accent3:#06b6d4;
    --good:#22c55e;
    --bad:#ef4444;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
    min-height:100vh;
  }
  .bg-blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.35;animation:floatBlob 18s ease-in-out infinite;}
  .blob1{width:420px;height:420px;background:var(--accent1);top:-100px;left:-100px;}
  .blob2{width:380px;height:380px;background:var(--accent2);bottom:-120px;right:-80px;animation-delay:-6s;}
  .blob3{width:300px;height:300px;background:var(--accent3);top:40%;left:60%;animation-delay:-11s;}
  @keyframes floatBlob{
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(40px,-30px) scale(1.08);}
    66%{transform:translate(-30px,20px) scale(0.95);}
  }

  .navbar{
    position:relative;z-index:2;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 32px;
    border-bottom:1px solid var(--panel-border);
    backdrop-filter:blur(12px);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;}
  .brand .logo{
    width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:16px;
    box-shadow:0 0 20px rgba(139,92,246,0.5);
  }
  .nav-right{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--muted);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px;transition:background .3s;}
  .status-dot.ok{background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 2s infinite;}
  .status-dot.err{background:var(--bad);box-shadow:0 0 8px var(--bad);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  .nav-right a{color:var(--muted);text-decoration:none;transition:color .2s;}
  .nav-right a:hover{color:var(--text);}

  .layout{
    position:relative;z-index:1;
    display:grid;grid-template-columns:300px 1fr;gap:20px;
    max-width:1200px;margin:28px auto;padding:0 24px;
    height:calc(100vh - 130px);
  }
  @media (max-width:820px){.layout{grid-template-columns:1fr;height:auto;}}

  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:16px;
    backdrop-filter:blur(14px);
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
  }

  .sidebar{padding:20px;display:flex;flex-direction:column;gap:16px;}
  .sidebar h2{margin:0;font-size:14px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}

  .dropzone{
    border:1.5px dashed var(--panel-border);
    border-radius:12px;
    padding:26px 14px;
    text-align:center;
    font-size:13px;color:var(--muted);
    cursor:pointer;
    transition:all .25s;
  }
  .dropzone:hover, .dropzone.dragover{
    border-color:var(--accent1);
    background:rgba(139,92,246,0.08);
    color:var(--text);
    transform:scale(1.02);
  }
  .dropzone .icon{font-size:26px;display:block;margin-bottom:8px;}

  .doc-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;}
  .doc-item{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-border);
    font-size:12.5px;
    animation:fadeInUp .35s ease both;
  }
  .doc-item .dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex-shrink:0;}
  .doc-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .doc-item .chunks{color:var(--muted);font-size:11px;}

  .chat-panel{display:flex;flex-direction:column;overflow:hidden;}
  .chat-window{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
  .empty-state{margin:auto;text-align:center;color:var(--muted);font-size:14px;max-width:320px;line-height:1.6;}
  .empty-state .big{font-size:34px;display:block;margin-bottom:10px;}

  .msg{max-width:78%;animation:fadeInUp .4s ease both;}
  .msg.user{align-self:flex-end;}
  .msg.assistant{align-self:flex-start;}
  .bubble{
    padding:13px 16px;border-radius:16px;font-size:14.5px;line-height:1.55;white-space:pre-wrap;
  }
  .msg.user .bubble{
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    color:white;border-bottom-right-radius:4px;
  }
  .msg.assistant .bubble{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--panel-border);
    border-bottom-left-radius:4px;
  }
  .msg.assistant .bubble strong{color:#c4b5fd;}
  .meta-row{display:flex;gap:10px;align-items:center;margin-top:6px;font-size:11px;color:var(--muted);padding:0 4px;}
  .sources{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .source-chip{
    font-size:11px;padding:4px 9px;border-radius:999px;
    background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.35);
    color:#67e8f9;cursor:pointer;transition:all .2s;
  }
  .source-chip:hover{background:rgba(6,182,212,0.25);transform:translateY(-1px);}

  .typing{display:flex;gap:4px;padding:14px 16px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-6px);opacity:1;}}

  @keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

  .chat-input-row{
    display:flex;gap:10px;padding:16px;border-top:1px solid var(--panel-border);
  }
  .chat-input-row input{
    flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--panel-border);
    color:var(--text);border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;
    outline:none;transition:border-color .2s;
  }
  .chat-input-row input:focus{border-color:var(--accent1);}
  .chat-input-row button{
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    border:none;color:white;border-radius:12px;padding:0 22px;font-weight:600;
    cursor:pointer;font-size:14px;transition:transform .15s, box-shadow .15s;
  }
  .chat-input-row button:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(139,92,246,0.4);}
  .chat-input-row button:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}

  #toastContainer{position:fixed;top:20px;right:20px;z-index:50;display:flex;flex-direction:column;gap:10px;}
  .toast{
    background:rgba(20,20,30,0.95);border:1px solid var(--panel-border);
    padding:12px 16px;border-radius:12px;font-size:13px;min-width:220px;
    animation:slideIn .3s ease both;box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.error{border-color:rgba(239,68,68,0.5);}
  .toast.success{border-color:rgba(34,197,94,0.5);}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px;}
</style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <nav class="navbar">
    <div class="brand"><span class="logo">🧠</span> RAG Knowledge Assistant</div>
    <div class="nav-right">
      <span><span id="statusDot" class="status-dot"></span><span id="statusText">Checking API...</span></span>
      <a href="https://github.com/Aravindac01/rag-knowledge-assistant" target="_blank">GitHub ↗</a>
    </div>
  </nav>

  <div class="layout">
    <aside class="card sidebar">
      <h2>Documents</h2>
      <div id="dropzone" class="dropzone">
        <span class="icon">📄</span>
        Drag & drop a PDF or .txt file here<br>or click to browse
      </div>
      <input type="file" id="fileInput" accept=".pdf,.txt" hidden />
      <h2 style="margin-top:6px;">Ingested</h2>
      <ul id="docList" class="doc-list"></ul>
    </aside>

    <section class="card chat-panel">
      <div id="chatWindow" class="chat-window">
        <div class="empty-state" id="emptyState">
          <span class="big">💬</span>
          Upload a document, then ask a question about it. Answers are grounded in your documents with cited sources.
        </div>
      </div>
      <form id="chatForm" class="chat-input-row">
        <input id="questionInput" placeholder="Ask a question about your documents..." autocomplete="off" />
        <button type="submit" id="sendBtn">Ask</button>
      </form>
    </section>
  </div>

  <div id="toastContainer"></div>

<script>
const chatWindow = document.getElementById('chatWindow');
const emptyState = document.getElementById('emptyState');
const chatForm = document.getElementById('chatForm');
const questionInput = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const docList = document.getElementById('docList');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

function toast(message, type='success'){
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3500);
}

async function checkHealth(){
  try{
    const res = await fetch('/health');
    if(res.ok){
      statusDot.classList.add('ok');
      statusText.textContent = 'API connected';
    } else throw new Error();
  }catch(e){
    statusDot.classList.add('err');
    statusText.textContent = 'API unreachable';
  }
}
checkHealth();

function formatAnswer(text){
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return html;
}

function addMessage(role, content, meta){
  emptyState.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if(role === 'assistant'){
    bubble.innerHTML = formatAnswer(content);
  } else {
    bubble.textContent = content;
  }
  msg.appendChild(bubble);

  if(meta && meta.sources && meta.sources.length){
    const metaRow = document.createElement('div');
    metaRow.className = 'meta-row';
    metaRow.textContent = `${meta.latency_ms ? (meta.latency_ms/1000).toFixed(2)+'s' : ''} ${meta.tokens_used ? '· '+meta.tokens_used+' tokens' : ''}`;
    msg.appendChild(metaRow);

    const sourcesDiv = document.createElement('div');
    sourcesDiv.className = 'sources';
    meta.sources.forEach((s, i)=>{
      const chip = document.createElement('span');
      chip.className = 'source-chip';
      chip.textContent = `[${i+1}] ${s.source}`;
      chip.title = s.text;
      chip.onclick = () => toast(s.text, 'success');
      sourcesDiv.appendChild(chip);
    });
    msg.appendChild(sourcesDiv);
  }

  chatWindow.appendChild(msg);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function addTyping(){
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.id = 'typingIndicator';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  msg.appendChild(bubble);
  chatWindow.appendChild(msg);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}
function removeTyping(){
  const el = document.getElementById('typingIndicator');
  if(el) el.remove();
}

chatForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const question = questionInput.value.trim();
  if(!question) return;
  addMessage('user', question);
  questionInput.value = '';
  sendBtn.disabled = true;
  addTyping();

  try{
    const res = await fetch('/query', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({question, top_k:5})
    });
    const data = await res.json();
    removeTyping();
    if(!res.ok){
      addMessage('assistant', 'Something went wrong: ' + (data.detail || res.status));
    } else {
      addMessage('assistant', data.answer, data);
    }
  }catch(err){
    removeTyping();
    addMessage('assistant', 'Network error: could not reach the API.');
  }finally{
    sendBtn.disabled = false;
  }
});

async function uploadFile(file){
  toast(`Uploading ${file.name}...`);
  const formData = new FormData();
  formData.append('file', file);
  try{
    const res = await fetch('/ingest', { method:'POST', body: formData });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'Upload failed');
    toast(`Ingested ${data.source} (${data.chunks_added} chunks)`, 'success');
    const item = document.createElement('li');
    item.className = 'doc-item';
    item.innerHTML = `<span class="dot"></span><span class="name">${data.source}</span><span class="chunks">${data.chunks_added} chunks</span>`;
    docList.prepend(item);
  }catch(err){
    toast(err.message || 'Upload failed', 'error');
  }
}

dropzone.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', ()=>{
  if(fileInput.files[0]) uploadFile(fileInput.files[0]);
});
['dragover','dragenter'].forEach(evt=>{
  dropzone.addEventListener(evt, (e)=>{ e.preventDefault(); dropzone.classList.add('dragover'); });
});
['dragleave','drop'].forEach(evt=>{
  dropzone.addEventListener(evt, (e)=>{ e.preventDefault(); dropzone.classList.remove('dragover'); });
});
dropzone.addEventListener('drop', (e)=>{
  const file = e.dataTransfer.files[0];
  if(file) uploadFile(file);
});
</script>
</body>
</html>
